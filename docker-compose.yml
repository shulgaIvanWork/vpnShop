services:
  postgres:
    image: postgres:16-alpine
    container_name: max-vpn-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: max-vpn-redis
    restart: always
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  bot:
    build: .
    container_name: max-vpn-bot
    volumes:
      - ./app/data:/app/data
      - ./plans.json:/app/data/plans.json
      - ./app/logs:/app/logs
    env_file:
      - .env
    stop_signal: SIGINT
    restart: unless-stopped
    command: >
      sh -c "
        poetry run alembic -c /app/db/alembic.ini upgrade head &&
        poetry run python /app/__main__.py"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8080:8080"

  worker:
    build: .
    container_name: max-vpn-worker
    volumes:
      - ./app/data:/app/data
      - ./app/logs:/app/logs
    env_file:
      - .env
    stop_signal: SIGINT
    restart: unless-stopped
    command: poetry run python /app/worker.py
    depends_on:
      - postgres
      - redis
      - bot

volumes:
  postgres_data:
  redis_data:
